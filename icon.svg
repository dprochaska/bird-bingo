<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- App background -->
  <rect width="512" height="512" rx="112" fill="#192C22"/>

  <!-- 3x3 grid cells: margin=50, cell=120, gap=11 -->
  <!-- Cols at x: 50, 181, 312 | Rows at y: 50, 181, 312 -->

  <!-- Row 1 -->
  <rect x="50"  y="50"  width="120" height="120" rx="14" fill="#1F3529"/>
  <rect x="181" y="50"  width="120" height="120" rx="14" fill="#1A2E22"/>
  <rect x="312" y="50"  width="120" height="120" rx="14" fill="#1A2E22"/>
  <!-- Row 2 -->
  <rect x="50"  y="181" width="120" height="120" rx="14" fill="#1A2E22"/>
  <rect x="181" y="181" width="120" height="120" rx="14" fill="#1F3529"/>
  <rect x="312" y="181" width="120" height="120" rx="14" fill="#1A2E22"/>
  <!-- Row 3 -->
  <rect x="50"  y="312" width="120" height="120" rx="14" fill="#1A2E22"/>
  <rect x="181" y="312" width="120" height="120" rx="14" fill="#1A2E22"/>
  <rect x="312" y="312" width="120" height="120" rx="14" fill="#1F3529"/>

  <!-- Gold borders on diagonal win cells -->
  <rect x="50"  y="50"  width="120" height="120" rx="14" fill="none" stroke="#E2BC44" stroke-width="5"/>
  <rect x="181" y="181" width="120" height="120" rx="14" fill="none" stroke="#E2BC44" stroke-width="5"/>
  <rect x="312" y="312" width="120" height="120" rx="14" fill="none" stroke="#E2BC44" stroke-width="5"/>

  <!-- Bird in top-left cell (center 110, 110) — perching bird facing right -->
  <g transform="translate(110,114)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="26" ry="16" fill="#E2BC44" transform="rotate(-10)"/>
    <!-- Tail: triangle extending back-left -->
    <polygon points="-24,2 -46,-14 -44,12" fill="#E2BC44"/>
    <!-- Head -->
    <circle cx="24" cy="-17" r="14" fill="#E2BC44"/>
    <!-- Beak -->
    <polygon points="35,-20 54,-16 35,-12" fill="#E2BC44"/>
    <!-- Eye -->
    <circle cx="28" cy="-19" r="3.5" fill="#192C22"/>
    <!-- Legs -->
    <line x1="-4" y1="14" x2="-8" y2="28" stroke="#E2BC44" stroke-width="4" stroke-linecap="round"/>
    <line x1="8"  y1="14" x2="4"  y2="28" stroke="#E2BC44" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Bird in center cell (center 241, 241) — bird in flight -->
  <g transform="translate(241,241)">
    <!-- Left wing -->
    <path d="M-44,10 Q-24,-20 0,4" fill="none" stroke="#E2BC44" stroke-width="13" stroke-linecap="round"/>
    <!-- Right wing -->
    <path d="M0,4 Q24,-20 44,10" fill="none" stroke="#E2BC44" stroke-width="13" stroke-linecap="round"/>
    <!-- Body -->
    <ellipse cx="0" cy="4" rx="9" ry="6" fill="#E2BC44"/>
    <!-- Head -->
    <circle cx="0" cy="-4" r="7" fill="#E2BC44"/>
    <!-- Beak -->
    <polygon points="5,-6 18,-2 5,-1" fill="#E2BC44"/>
  </g>

  <!-- Bird in bottom-right cell (center 372, 372) — perching bird facing left -->
  <g transform="translate(372,376) scale(-1,1)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="26" ry="16" fill="#E2BC44" transform="rotate(-10)"/>
    <!-- Tail -->
    <polygon points="-24,2 -46,-14 -44,12" fill="#E2BC44"/>
    <!-- Head -->
    <circle cx="24" cy="-17" r="14" fill="#E2BC44"/>
    <!-- Beak -->
    <polygon points="35,-20 54,-16 35,-12" fill="#E2BC44"/>
    <!-- Eye -->
    <circle cx="28" cy="-19" r="3.5" fill="#192C22"/>
    <!-- Legs -->
    <line x1="-4" y1="14" x2="-8" y2="28" stroke="#E2BC44" stroke-width="4" stroke-linecap="round"/>
    <line x1="8"  y1="14" x2="4"  y2="28" stroke="#E2BC44" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
